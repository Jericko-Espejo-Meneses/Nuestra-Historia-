<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia - Joaqui & Jericko</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: #0d0d0d;
            color: #f5f0eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ========== EFECTO CORAZONES EN EL FONDO ========== */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-heart {
            position: absolute;
            bottom: -50px;
            font-size: 15px;
            color: rgba(229, 193, 88, 0.2); /* Dorado semi-transparente */
            animation: floatUp 8s linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            z-index: 1;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #e5c158; /* Dorado elegante */
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(229, 193, 88, 0.3);
        }
        p.subtitle {
            font-style: italic;
            font-size: 0.95rem;
            color: #a69f96;
            margin-bottom: 25px;
        }

        /* ========== CONTADOR DE TIEMPO REAL ========== */
        .counter-container {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(229, 193, 88, 0.3);
            border-radius: 50px;
            padding: 12px 25px;
            display: inline-flex;
            gap: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #f5f0eb;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        .counter-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-number {
            font-weight: bold;
            color: #e5c158;
            font-size: 1.1rem;
        }
        .counter-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a69f96;
        }

        .gallery {
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            gap: 35px;
            z-index: 1;
            transition: max-width 0.3s ease;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
            display: flex;
            flex-direction: column; 
        }
        
        /* Efecto hover premium para laptop */
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(229, 193, 88, 0.25);
                border-color: rgba(229, 193, 88, 0.6);
            }
        }

        .media-container {
            width: 100%;
            display: block;
        }
        .card img, .card video {
            width: 100%;
            height: auto;
            display: block;
        }
        .poem-container {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid #2d2d2d; 
            background-color: #151515;
        }
        .poem-text {
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e5c158; 
            white-space: pre-line; 
        }

        /* ==========================================
           PANTALLAS GRANDES (LAPTOPS / TABLETS)
           ========================================== */
        @media (min-width: 768px) {
            .gallery {
                max-width: 900px; 
            }
            .card {
                flex-direction: row; 
                align-items: stretch;
            }
            .media-container {
                width: 50%; 
            }
            .poem-container {
                width: 50%; 
                padding: 40px;
                border-top: none;
                border-left: 1px solid #2d2d2d; 
            }
            .poem-text {
                font-size: 1.1rem;
            }
            h1 {
                font-size: 2.8rem;
            }
            .counter-container {
                font-size: 1.1rem;
                padding: 15px 35px;
            }
            .counter-number {
                font-size: 1.4rem;
            }
        }

        footer {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
            z-index: 1;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Capa para corazones flotantes -->
    <div class="heart-bg" id="heart-bg"></div>

    <header>
        <h1>NUESTRA HISTORIA</h1>
        <p class="subtitle">Cada instante contigo es mi favorito.</p>
        
        <!-- CONTADOR DE TIEMPO INTERACTIVO -->
        <div class="counter-container">
            <div class="counter-item">
                <span class="counter-number" id="days">00</span>
                <span class="counter-label">Días</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="hours">00</span>
                <span class="counter-label">Horas</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="minutes">00</span>
                <span class="counter-label">Min</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="seconds">00</span>
                <span class="counter-label">Seg</span>
            </div>
        </div>
    </header>

    <!-- Contenedor de galería -->
    <div class="gallery" id="photo-gallery"></div>

    <footer>
        <p>Hecho con ❤️ por Jericko — 2026</p>
    </footer>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE INGENIERO
        // ==========================================
        
        // FECHA DE ANIVERSARIO CONFIGURADA: 18 de abril de 2026
        // Nota: 3 representa Abril porque JavaScript cuenta los meses desde el 0
        const fechaInicio = new Date(2026, 3, 18, 0, 0, 0); 

        const totalElementos = 41; 
        const carpeta = 'fotos';   

        const indicesVideos = [35,36,37,38,39,40,41]; 

        // ==========================================
        // DICCIONARIO DE POEMAS (1 al 41)
        // ==========================================
        const poemas = {
            1: "En tu mirada encontré mi lugar favorito,\nun refugio dulce, tierno e infinito.",
            2: "El primer día que te vi sonreír,\nsupe que a tu lado quería vivir.",
            3: "Caminando de tu mano el mundo se detiene,\nno hay tormenta en mi vida que tu amor no frene.",
            4: "Tu abrazo es mi rincón de paz,\ndonde todo el ruido de afuera se vuelve fugaz.",
            5: "Cada risa compartida en una tarde cualquiera\nse convierte en mi mejor primavera.",
            6: "No existen kilómetros ni horas perdidas,\nsi al final del camino nuestras almas quedan unidas.",
            7: "Tu amor me enseña a ver la vida de otra manera,\nmás bonita, más sincera, más de veras.",
            8: "A tu lado, los momentos más sencillos del día\nse transforman en la más hermosa poesía.",
            9: "Tienes el superpoder de hacerme feliz con solo mirarme,\ny el tierno vicio de siempre enamorarme.",
            10: "Elegirte a ti ha sido, sin duda alguna,\nmi mayor acierto bajo la luz de la luna.",
            11: "Podrá caerse el cielo o temblar el suelo entero,\npero a tu lado yo sé que nada temo.",
            12: "Eres esa casualidad que no estaba buscando,\npero que terminó salvándome y cambiándolo todo.",
            13: "Si me dieran a elegir una vida de nuevo,\nte buscaría más rápido para amarte primero.",
            14: "Me encantan tus detalles, tus gestos al hablar,\ny esa forma tan tuya de hacerme soñar.",
            15: "Nuestras miradas se entienden sin decir una palabra,\nes la magia más hermosa que nuestro pecho guarda.",
            16: "En este mundo de prisas y de tanto correr,\ntú eres el único puerto donde quiero volver.",
            17: "Gracias por tu paciencia, tu ternura y tu calor,\npor ser mi compañera, mi cómplice y mi amor.",
            18: "Cada foto contigo guarda un pedacito de felicidad,\nun instante atrapado para toda la eternidad.",
            19: "Eres mi cable a tierra, mi calma y mi alegría,\nla persona que ilumina de colores mi día.",
            20: "Qué bonito es saber que en las buenas y en las malas,\ntengo tu mano lista para darme alas.",
            21: "Nuestra historia no tiene que ser perfecta,\ncon que sea nuestra, para mí es la correcta.",
            22: "Amo cómo eres cuando nadie más te ve,\ntu lado más tierno, el que siempre cuidaré.",
            23: "Me haces querer ser una mejor versión de mí,\nsolo para darte la felicidad que mereces vivir.",
            24: "Que el tiempo pase y nos llene de arrugas la piel,\nmientras nuestro amor se mantenga dulce y fiel.",
            25: "Tu sonrisa es mi combustible de cada mañana,\nla melodía más dulce que entra por mi ventana.",
            26: "No hay día gris si estás tú para pintarlo,\nni obstáculo grande si juntos vamos a superarlo.",
            27: "Tu corazón y el mío laten al mismo compás,\ny sé que donde vayas, yo te seguiré detrás.",
            28: "Eres mi rincón favorito en todo el planeta,\nla respuesta más hermosa a lo que el alma busca.",
            29: "Un día nos encontramos casi sin querer,\ny hoy no imagino un mañana sin tu ser.",
            30: "Quédate con quien te mire como yo te miro a ti,\ncon el alma entera y el corazón feliz.",
            31: "La vida es más bonita si la caminamos juntos,\npaso a paso, coleccionando mundos.",
            32: "Cada recuerdo contigo es un tesoro sin igual,\nel inicio de un viaje que no tiene final.",
            33: "Amo tus locuras, tus risas y tu forma de amar,\neres el hogar más cálido que pude encontrar.",
            34: "Por mil momentos más coleccionando sonrisas,\nsin miedos, sin dudas y sin tener prisas.",
            35: "Verte reír en movimiento es mi escena favorita,\nesa alegría tuya que a mí me resucita.",
            36: "Guardar estos instantes vivos es mi mayor obsesión,\nporque en cada segundo late fuerte mi corazón.",
            37: "Nuestra complicidad grabada en un instante eterno,\npara recordar lo bonito de este amor tan tierno.",
            38: "Risas espontáneas, miradas que lo dicen todo,\nnuestra forma de querernos a nuestro propio modo.",
            39: "Cada paso que damos nos acerca más al futuro,\nun camino de tu mano que es mi lugar más seguro.",
            40: "Tenerte cerca es todo lo que necesito para estar bien,\neres mi principio, mi mitad y mi final también.",
            41: "De aquí hasta el infinito, cuidándonos y amándonos siempre.\nEres lo más hermoso que me ha pasado.\nTe amo, Joaqui. ❤️"
        };

        // ==========================================
        // CÓDIGO DEL CONTADOR REAL
        // ==========================================
        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = d.toString().padStart(2, '0');
            document.getElementById('hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = m.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = s.toString().padStart(2, '0');
        }
        setInterval(actualizarContador, 1000);
        actualizarContador();

        // ==========================================
        // CÓDIGO DE CORAZONES FLOTANTES
        // ==========================================
        const heartBg = document.getElementById('heart-bg');
        const simbolos = ['❤️', '💖', '✨', '💕', '🦆', '🐥']; // ¡Con patitos y pollitos incluidos!

        function crearCorazon() {
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * (22 - 12) + 12 + 'px';
            heart.style.animationDuration = Math.random() * (12 - 6) + 6 + 's';
            
            heartBg.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 12000);
        }
        setInterval(crearCorazon, 1200);

        // ==========================================
        // GENERACIÓN DE TARJETAS ORIGINALES
        // ==========================================
        const gallery = document.getElementById('photo-gallery');

        for (let i = 1; i <= totalElementos; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${i * 0.15}s`; 

            const mediaContainer = document.createElement('div');
            mediaContainer.className = 'media-container';

            if (indicesVideos.includes(i)) {
                const video = document.createElement('video');
                video.src = `${carpeta}/${i}.mp4`;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true; 
                video.controls = true; 
                
                mediaContainer.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = `${carpeta}/${i}.jpeg`; 
                img.alt = `Momento ${i}`;
                img.loading = 'lazy'; 

                img.onerror = function() {
                    if (this.src.endsWith('.jpeg')) {
                        this.src = `${carpeta}/${i}.jpg`; 
                    } else if (this.src.endsWith('.jpg')) {
                        this.src = `${carpeta}/${i}.png`; 
                    }
                };

                mediaContainer.appendChild(img);
            }

            card.appendChild(mediaContainer);

            const poemContainer = document.createElement('div');
            poemContainer.className = 'poem-container';

            const poemParagraph = document.createElement('p');
            poemParagraph.className = 'poem-text';
            
            poemParagraph.textContent = poemas[i] || `Momento único contigo... ❤️`;

            poemContainer.appendChild(poemParagraph);
            card.appendChild(poemContainer);

            gallery.appendChild(card);
        }
    </script>
</body>
</html>
</html>
