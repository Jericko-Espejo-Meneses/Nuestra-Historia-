<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia - Joaqui & Jericko</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: #0d0d0d;
            color: #f5f0eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ========== EFECTO CORAZONES EN EL FONDO ========== */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-heart {
            position: absolute;
            bottom: -50px;
            font-size: 15px;
            color: rgba(229, 193, 88, 0.2); 
            animation: floatUp 8s linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            z-index: 1;
        }
        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #e5c158; 
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(229, 193, 88, 0.3);
        }
        p.subtitle {
            font-style: italic;
            font-size: 0.95rem;
            color: #a69f96;
            margin-bottom: 25px;
        }

        /* ========== CONTADOR DE TIEMPO REAL ========== */
        .counter-container {
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(229, 193, 88, 0.3);
            border-radius: 50px;
            padding: 12px 25px;
            display: inline-flex;
            gap: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #f5f0eb;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        .counter-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-number {
            font-weight: bold;
            color: #e5c158;
            font-size: 1.1rem;
        }
        .counter-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a69f96;
        }

        .gallery {
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            gap: 35px;
            z-index: 1;
            transition: max-width 0.3s ease;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
            display: flex;
            flex-direction: column; 
        }
        
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(229, 193, 88, 0.25);
                border-color: rgba(229, 193, 88, 0.6);
            }
        }

        .media-container {
            width: 100%;
            display: block;
        }
        .card img, .card video {
            width: 100%;
            height: auto;
            display: block;
        }
        .poem-container {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid #2d2d2d; 
            background-color: #151515;
        }
        .poem-text {
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e5c158; 
            white-space: pre-line; 
        }

        /* ========== OPCIÓN 2: DISEÑO DEL SOBRE Y CARTA INTERACTIVA ========== */
        .envelope-section {
            width: 100%;
            max-width: 450px;
            margin-top: 50px;
            margin-bottom: 30px;
            z-index: 2;
            text-align: center;
        }
        .envelope-btn {
            background: #1a1a1a;
            border: 2px solid #e5c158;
            color: #e5c158;
            padding: 15px 30px;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(229, 193, 88, 0.2);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .envelope-btn:hover {
            background: #e5c158;
            color: #0d0d0d;
            box-shadow: 0 8px 20px rgba(229, 193, 88, 0.4);
            transform: scale(1.05);
        }
        .letter-container {
            display: none;
            width: 100%;
            background: #151515;
            border: 1px solid #e5c158;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
        }
        .letter-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #f5f0eb;
            white-space: pre-wrap;
            font-family: 'Georgia', serif;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background-color: #e5c158;
            margin-left: 3px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ========== OPCIÓN 1: BOTÓN FLOTANTE MÚSICA ========== */
        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #1a1a1a;
            border: 2px solid #e5c158;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .music-control:hover {
            transform: scale(1.1);
        }
        .music-control svg {
            width: 25px;
            height: 25px;
            fill: #e5c158;
        }
        .rotating {
            animation: rotateVinyl 3s linear infinite;
        }
        @keyframes rotateVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ==========================================
           PANTALLAS GRANDES (LAPTOPS / TABLETS)
           ========================================== */
        @media (min-width: 768px) {
            .gallery, .envelope-section {
                max-width: 900px; 
            }
            .card {
                flex-direction: row; 
                align-items: stretch;
            }
            .media-container {
                width: 50%; 
            }
            .poem-container {
                width: 50%; 
                padding: 40px;
                border-top: none;
                border-left: 1px solid #2d2d2d; 
            }
            .poem-text {
                font-size: 1.1rem;
            }
            h1 {
                font-size: 2.8rem;
            }
            .counter-container {
                font-size: 1.1rem;
                padding: 15px 35px;
            }
            .counter-number {
                font-size: 1.4rem;
            }
            .letter-text {
                font-size: 1.15rem;
            }
        }

        footer {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
            z-index: 1;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Capa para corazones flotantes -->
    <div class="heart-bg" id="heart-bg"></div>

    <!-- REPRODUCTOR FLOTANTE DE MÚSICA (Audio Invisible) -->
    <audio id="bg-audio" src="musica.mp3" loop></audio>
    <div class="music-control" id="music-btn" onclick="toggleMúsica()">
        <!-- Ícono del vinilo/nota musical -->
        <svg viewBox="0 0 24 24" id="play-icon">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5 1.5.67 1.5 1.5zm0-4.5c0 .55-.45 1-1 1s-1-.45-1-1V8c0-.55.45-1 1-1s1 .45 1 1v4z"/>
        </svg>
    </div>

    <header>
        <h1>NUESTRA HISTORIA</h1>
        <p class="subtitle">Cada instante contigo es mi favorito.</p>
        
        <!-- CONTADOR DE TIEMPO INTERACTIVO -->
        <div class="counter-container">
            <div class="counter-item">
                <span class="counter-number" id="days">00</span>
                <span class="counter-label">Días</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="hours">00</span>
                <span class="counter-label">Horas</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="minutes">00</span>
                <span class="counter-label">Min</span>
            </div>
            <span style="color:#e5c158;">:</span>
            <div class="counter-item">
                <span class="counter-number" id="seconds">00</span>
                <span class="counter-label">Seg</span>
            </div>
        </div>
    </header>

    <!-- Contenedor de galería -->
    <div class="gallery" id="photo-gallery"></div>

    <!-- SECCIÓN DE LA CARTA ESCRITA POR LA MÁQUINA DE ESCRIBIR -->
    <div class="envelope-section">
        <button class="envelope-btn" id="open-btn" onclick="abrirCarta()">
            💌 Abrir nuestra carta especial
        </button>
        <div class="letter-container" id="letter-container">
            <div class="letter-text" id="typed-text"></div><span class="cursor" id="cursor-elem"></span>
        </div>
    </div>

    <footer>
        <p>Hecho con ❤️ por Jericko — 2026</p>
    </footer>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE INGENIERO
        // ==========================================
        const fechaInicio = new Date(2026, 3, 18, 0, 0, 0); 
        const totalElementos = 41; 
        const carpeta = 'fotos';   
        const indicesVideos = [35,36,37,38,39,40,41]; 

        // ==========================================
        // TEXTO DE TU CARTA DIGITAL (Efecto máquina de escribir)
        // ==========================================
        const textoCarta = `Hola, mi Joaqui hermosa... ❤️\n\nSi estás leyendo esto, significa que lograste escanear el QR que puse en tu cajita. Quería hacer algo totalmente diferente para ti, algo que no pudieras encontrar en ninguna tienda del mundo, porque lo que siento por ti tampoco es algo común.\n\nDesde aquel 18 de abril de 2026 en el que nos conocimos, mi vida tomó un rumbo mucho más bonito y lleno de luz. Cada uno de los 41 momentos que ves arriba (y todos los que nos faltan guardar) representan los instantes en los que me he sentido el chico más afortunado del planeta a tu lado.\n\nA veces me cuesta expresar todo lo que siento con palabras en el día a día, o me dices que solo soy detallista en momentos especiales, pero con esto quería demostrarte que pienso en ti a cada hora, y que soy capaz de sentarme días enteros a diseñar, escribir y programar un universo entero solo para verte sonreír.\n\nGracias por ser mi patito, mi cómplice y mi lugar seguro. Prometo seguir llenando esta página (y nuestras vidas) de muchos más recuerdos, risas, viajes y amor.\n\nTe amo con todo mi corazón, hoy, mañana y para siempre. 💕\n\nTu Jericko. 🦆🐥`;

        // ==========================================
        // DICCIONARIO DE POEMAS (1 al 41)
        // ==========================================
        const poemas = {
            1: "En tu mirada encontré mi lugar favorito,\nun refugio dulce, tierno e infinito.",
            2: "El primer día que te vi sonreír,\nsupe que a tu lado quería vivir.",
            3: "Caminando de tu mano el mundo se detiene,\nno hay tormenta en mi vida que tu amor no frene.",
            4: "Tu abrazo es mi rincón de paz,\ndonde todo el ruido de afuera se vuelve fugaz.",
            5: "Cada risa compartida en una tarde cualquiera\nse convierte en mi mejor primavera.",
            6: "No existen kilómetros ni horas perdidas,\nsi al final del camino nuestras almas quedan unidas.",
            7: "Tu amor me enseña a ver la vida de otra manera,\nmás bonita, más sincera, más de veras.",
            8: "A tu lado, los momentos más sencillos del día\nse transforman en la más hermosa poesía.",
            9: "Tienes el superpoder de hacerme feliz con solo mirarme,\ny el tierno vicio de siempre enamorarme.",
            10: "Elegirte a ti ha sido, sin duda alguna,\nmi mayor acierto bajo la luz de la luna.",
            11: "Podrá caerse el cielo o temblar el suelo entero,\npero a tu lado yo sé que nada temo.",
            12: "Eres esa casualidad que no estaba buscando,\npero que terminó salvándome y cambiándolo todo.",
            13: "Si me dieran a elegir una vida de nuevo,\nte buscaría más rápido para amarte primero.",
            14: "Me encantan tus detalles, tus gestos al hablar,\ny esa forma tan tuya de hacerme soñar.",
            15: "Nuestras miradas se entienden sin decir una palabra,\nes la magia más hermosa que nuestro pecho guarda.",
            16: "En este mundo de prisas y de tanto correr,\ntú eres el único puerto donde quiero volver.",
            17: "Gracias por tu paciencia, tu ternura y tu calor,\npor ser mi compañera, mi cómplice y mi amor.",
            18: "Cada foto contigo guarda un pedacito de felicidad,\nun instante atrapado para toda la eternidad.",
            19: "Eres mi cable a tierra, mi calma y mi alegría,\nla persona que ilumina de colores mi día.",
            20: "Qué bonito es saber que en las buenas y en las malas,\ntengo tu mano lista para darme alas.",
            21: "Nuestra historia no tiene que ser perfecta,\ncon que sea nuestra, para mí es la correcta.",
            22: "Amo cómo eres cuando nadie más te ve,\ntu lado más tierno, el que siempre cuidaré.",
            23: "Me haces querer ser una mejor versión de mí,\nsolo para darte la felicidad que mereces vivir.",
            24: "Que el tiempo pase y nos llene de arrugas la piel,\nmientras nuestro amor se mantenga dulce y fiel.",
            25: "Tu sonrisa es mi combustible de cada mañana,\nla melodía más dulce que entra por mi ventana.",
            26: "No hay día gris si estás tú para pintarlo,\nni obstáculo grande si juntos vamos a superarlo.",
            27: "Tu corazón y el mío laten al mismo compás,\ny sé que donde vayas, yo te seguiré detrás.",
            28: "Eres mi rincón favorito en todo el planeta,\nla respuesta más hermosa a lo que el alma busca.",
            29: "Un día nos encontramos casi sin querer,\ndonde hoy no imagino un mañana sin tu ser.",
            30: "Quédate con quien te mire como yo te miro a ti,\ncon el alma entera y el corazón feliz.",
            31: "La vida es más bonita si la caminamos juntos,\npaso a paso, coleccionando mundos.",
            32: "Cada recuerdo contigo es un tesoro sin igual,\nel inicio de un viaje que no tiene final.",
            33: "Amo tus locuras, tus risas y tu forma de amar,\neres el hogar más cálido que pude encontrar.",
            34: "Por mil momentos más coleccionando sonrisas,\nsin miedos, sin dudas y sin tener prisas.",
            35: "Verte reír en movimiento es mi escena favorita,\nesa alegría tuya que a mí me resucita.",
            36: "Guardar estos instantes vivos es mi mayor obsesión,\nporque en cada segundo late fuerte mi corazón.",
            37: "Nuestra complicidad grabada en un instante eterno,\npara recordar lo bonito de este amor tan tierno.",
            38: "Risas espontáneas, miradas que lo dicen todo,\nnuestra forma de querernos a nuestro propio modo.",
            39: "Cada paso que damos nos acerca más al futuro,\nun camino de tu mano que es mi lugar más seguro.",
            40: "Tenerte cerca es todo lo que necesito para estar bien,\neres mi principio, mi mitad y mi final también.",
            41: "De aquí hasta el infinito, cuidándonos y amándonos siempre.\nEres lo más hermoso que me ha pasado.\nTe amo, Joaqui. ❤️"
        };

     // ==========================================
        // INTERACTIVIDAD: REPRODUCTOR MÚSICA (ULTRA FIX)
        // ==========================================
        const audio = document.getElementById('bg-audio');
        const musicBtn = document.getElementById('music-btn');
        let músicaActivadaPorClicGlobal = false;

        function actualizarIconoMusica(reproduciendo) {
            if (reproduciendo) {
                musicBtn.classList.add('rotating');
                musicBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:25px; height:25px; fill:#e5c158;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                `;
            } else {
                musicBtn.classList.remove('rotating');
                musicBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" style="width:25px; height:25px; fill:#e5c158;">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                `;
            }
        }

        function toggleMúsica() {
            músicaActivadaPorClicGlobal = true; 
            if (audio.paused) {
                audio.play().then(() => actualizarIconoMusica(true)).catch(err => console.log("Interacción requerida"));
            } else {
                audio.pause();
                actualizarIconoMusica(false);
            }
        }

        // ACTIVAR AL PRIMER CLIC EN CUALQUIER PARTE DE LA PÁGINA
        document.body.addEventListener('click', function() {
            if (!músicaActivadaPorClicGlobal) {
                audio.play()
                    .then(() => {
                        músicaActivadaPorClicGlobal = true;
                        actualizarIconoMusica(true);
                    })
                    .catch(err => {
                        console.error("Error de reproducción: ", err);
                    });
            }
        }, { once: true });

        // ==========================================
        // INTERACTIVIDAD: CARTA TIPO MÁQUINA DE ESCRIBIR
        // ==========================================
        let indexTexto = 0;
        function abrirCarta() {
            const btn = document.getElementById('open-btn');
            const container = document.getElementById('letter-container');
            const target = document.getElementById('typed-text');
            
            btn.style.display = 'none'; // Desaparece el botón
            container.style.display = 'block'; // Muestra el contenedor
            
            // Función de escritura en cascada
            function escribir() {
                if (indexTexto < textoCarta.length) {
                    target.textContent += textoCarta.charAt(indexTexto);
                    indexTexto++;
                    setTimeout(escribir, 45); // Velocidad de tecleado (45ms por letra)
                } else {
                    document.getElementById('cursor-elem').style.display = 'none'; // Quita el cursor al terminar
                }
            }
            escribir();
        }

        // ==========================================
        // CÓDIGO DEL CONTADOR REAL
        // ==========================================
        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = d.toString().padStart(2, '0');
            document.getElementById('hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = m.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = s.toString().padStart(2, '0');
        }
        setInterval(actualizarContador, 1000);
        actualizarContador();

        // ==========================================
        // CÓDIGO DE CORAZONES FLOTANTES
        // ==========================================
        const heartBg = document.getElementById('heart-bg');
        const simbolos = ['❤️', '💖', '✨', '💕', '🦆', '🐥']; 

        function crearCorazon() {
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * (22 - 12) + 12 + 'px';
            heart.style.animationDuration = Math.random() * (12 - 6) + 6 + 's';
            
            heartBg.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 12000);
        }
        setInterval(crearCorazon, 1200);

        // ==========================================
        // GENERACIÓN DE TARJETAS ORIGINALES
        // ==========================================
        const gallery = document.getElementById('photo-gallery');

        for (let i = 1; i <= totalElementos; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${i * 0.15}s`; 

            const mediaContainer = document.createElement('div');
            mediaContainer.className = 'media-container';

            if (indicesVideos.includes(i)) {
                const video = document.createElement('video');
                video.src = `${carpeta}/${i}.mp4`;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true; 
                video.controls = true; 
                
                mediaContainer.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = `${carpeta}/${i}.jpeg`; 
                img.alt = `Momento ${i}`;
                img.loading = 'lazy'; 

                img.onerror = function() {
                    if (this.src.endsWith('.jpeg')) {
                        this.src = `${carpeta}/${i}.jpg`; 
                    } else if (this.src.endsWith('.jpg')) {
                        this.src = `${carpeta}/${i}.png`; 
                    }
                };

                mediaContainer.appendChild(img);
            }

            card.appendChild(mediaContainer);

            const poemContainer = document.createElement('div');
            poemContainer.className = 'poem-container';

            const poemParagraph = document.createElement('p');
            poemParagraph.className = 'poem-text';
            
            poemParagraph.textContent = poemas[i] || `Momento único contigo... ❤️`;

            poemContainer.appendChild(poemParagraph);
            card.appendChild(poemContainer);

            gallery.appendChild(card);
        }
    </script>
</body>
</html>
